name: Sync Changes to R2

on:
  push:
    branches:
      - www

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so rclone can compare if needed

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Sync Changed Files to R2
        run: |
          # 'sync' makes the destination match the source
          # '--update' skips files that are newer on the destination
          # '--exclude' handles your .git folder request
          rclone sync . r2:${{ secrets.R2_BUCKET }} \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --verbose \
            --progress
