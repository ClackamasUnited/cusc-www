<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Coaching Staff | Clackamas United</title>
</head>
<body class="bg-white">

    <section class="py-20 max-w-7xl mx-auto px-6">
        <div class="mb-16 border-l-8 border-[#E21E26] pl-8">
            <h1 class="text-6xl font-display font-bold uppercase italic italic text-[#111111]">Coaching <span class="text-[#E21E26]">Staff</span></h1>
            <p class="text-gray-500 font-bold uppercase tracking-widest mt-2">Technical Leadership & Player Development</p>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-slate-50 p-8 border-t-4 border-black hover:border-[#E21E26] transition group shadow-sm">
                <h3 class="text-2xl font-display font-bold uppercase group-hover:text-[#E21E26]">John Wyllie</h3>
                <p class="text-[#E21E26] font-bold text-xs uppercase tracking-tighter mb-4">Director of Coaching (DOC)</p>
                <div class="text-[10px] font-bold uppercase text-gray-400 mb-4 tracking-widest">National D License</div>
                <a href="mailto:directorofcoaching@clackamasunited.com" class="text-sm font-medium border-b border-black/10 pb-1 hover:border-[#E21E26]">directorofcoaching@clackamasunited.com</a>
            </div>


            <div class="bg-slate-50 p-8 border-t-4 border-black hover:border-[#E21E26] transition group shadow-sm">
                <h3 class="text-2xl font-display font-bold uppercase group-hover:text-[#E21E26]">Phil Hulme</h3>
                <p class="text-[#E21E26] font-bold text-xs uppercase tracking-tighter mb-4">Technical Coordinator (11v11)</p>
                <div class="text-[10px] font-bold uppercase text-gray-400 mb-4 tracking-widest">International Experience</div>
                <a href="#" class="text-sm font-medium border-b border-black/10 pb-1 hover:border-[#E21E26]">Contact Phil</a>
            </div>

        </div>
    </section>

    <script src="/theme.js"></script>
    <script src="/sponsors-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => siteTheme.init("/"));
    </script>
</body>
</html>
