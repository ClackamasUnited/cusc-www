<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <title>Hired Banner Generator</title>
    <style>
        .font-display { font-family: 'Oswald', sans-serif; }
    </style>
</head>
<body class="bg-gray-500 flex items-center justify-center min-h-screen p-10">

    <!-- 
        INSTRUCTIONS:
        1. Open this file in your web browser.
        2. Take a screenshot of the generated image below.
        3. Save the screenshot as "hired-banner.png" in your "/news/images/" folder.
    -->

    <div class="relative inline-block shadow-lg rounded-lg overflow-hidden max-w-2xl">
        <img src="/news/images/were-hiring-grey.png" alt="We are hiring background" class="w-full">
        <div class="absolute bottom-0 left-0 w-[150%] origin-bottom-left -rotate-45 bg-[#E21E26] py-4 text-center shadow-2xl">
            <span class="font-display text-white text-4xl md:text-6xl font-bold uppercase tracking-wider">Hired!</span>
        </div>
    </div>

</body>
</html>
