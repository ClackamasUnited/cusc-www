<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Clackamas United | Home</title>
    <style>
        /*
         * Scalable Registration Status Display Logic
         *
         * 1. By default, hide all elements that are part of this conditional display system.
         * 2. Explicitly show only the element that matches the current data-registration-status.
         */
        .show-program-button,
        .show-reg-button,
        .show-tryout-button { display: none; }

        [show-reg-button="true"] .show-reg-button { display: initial; } /* 'initial' reverts to element's default display (e.g., block for p, inline-block for a) */
        [show-tryout-button="true"] .show-tryout-button { display: initial; }
        [show-program-button="true"] .show-program-button { display: initial; }
    </style>
</head>
<body class="bg-white" show-reg-button="false" show-tryout-button="false" show-program-button="true"> <!-- <-- EDIT THIS: "open" or "closed" or "preparing" -->

    <header class="relative h-[85vh] flex items-center bg-[#111111] text-white overflow-hidden" id="home-header">
        <div class="absolute inset-0">
            <img id="bg-image" src="" alt="Background image of soccer players" class="w-full h-full object-cover opacity-40 grayscale-[0.5]">
        </div>
        <div class="relative max-w-7xl mx-auto px-6 w-full flex items-start">
            <div class="w-[6px] h-[340px] md:h-[420px] bg-white mr-8 mt-2 shadow-2xl"></div>
            <div>
                <h1 class="font-display font-bold uppercase hero-title">
                    <span class="block text-7xl md:text-[140px] text-white">COMMUNITY.</span>
                    <span class="block text-7xl md:text-[140px] text-[#E21E26] italic">UNITED.</span>
                    <span class="block text-7xl md:text-[140px] text-white">SUCCESS.</span>
                    <span class="block text-7xl md:text-[140px] text-white">CHARACTER.</span>
                </h1>

                
                <div class="flex flex-wrap gap-4 mt-10">
                    <!-- Programs Button -->
                    <a href="/programs/overview.html" class="show-program-button bg-white/10 border border-white/40 px-10 py-5 font-black uppercase text-xs hover:bg-white/20 transition">Our Programs</a>
                    <!-- Tryouts Button -->
                    <a href="https://playmetrics.com/signup?clubToken=TG9naW4tQ2x1Yi52MS0xMDA2LTE3NzY4NDEzOTB8VUhKdmR4TFFjNGlwclRyUytON2tQOTRQdUwwREVkcmJnSURHL0tvSjljVT0=" class="show-tryout-button bg-[#E21E26] text-white px-10 py-5 font-black uppercase text-xs hover:bg-white hover:text-black transition-all">Join Tryouts</a>
                    <!-- Registration Button -->
                    <a href="https://playmetrics.com/signup?clubToken=TG9naW4tQ2x1Yi52MS0xMDA2LTE3NzY4NDEzOTB8VUhKdmR4TFFjNGlwclRyUytON2tQOTRQdUwwREVkcmJnSURHL0tvSjljVT0=" class="show-reg-button bg-[#E21E26] text-white px-10 py-5 font-black uppercase text-xs hover:bg-white hover:text-black transition-all">Join Tryouts</a>
                </div>
            </div>
        </div>
    </header>

    <section class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-display font-bold uppercase mb-12 italic">Latest <span class="text-[#E21E26]">News</span></h2>
            <div id="news-track" class="flex flex-wrap gap-6"></div>
        </div>
    </section>


    <script src="theme.js"></script>
    <script src="news-data.js"></script>
    <script src="sponsors-data.js"></script>
    <script>
        // Background image rotator
        document.addEventListener('DOMContentLoaded', function() {
            siteTheme.init("/");
            // Sort a copy of the news data to avoid modifying the original array
            const sortedNews = [...newsData].sort((a, b) => new Date(b.date) - new Date(a.date));
             const images = [
                "/images/news/CUSC-2026-27-CompetitiveJerseys.jpeg",
                "/images/camps/IMG_0686.jpeg",
                "/images/camps/rangers-gallery/cusc-rangers-016.jpg",
                "https://images.unsplash.com/photo-1551958219-acbc608c6377?auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80"
            ];
            let currentImageIndex = 0;
            const bgImage = document.getElementById('bg-image');

            // Set the initial image from the array
            if (images.length > 0) bgImage.src = images[0];

            setInterval(() => {
                currentImageIndex = (currentImageIndex + 1) % images.length;
                bgImage.src = images[currentImageIndex];
            }, 5000); // Change every 10 seconds
        });

    </script>
</body>
</html>
