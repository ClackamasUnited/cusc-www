<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>News | Clackamas United</title>
</head>
<body class="bg-white">

    <div id="page-content">
        <section class="py-24 bg-white">
            <div class="max-w-7xl mx-auto px-6">
                <h2 class="text-4xl font-display font-bold uppercase mb-12 italic">Latest <span class="text-[#E21E26]">News</span></h2>
                <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- News items will be inserted here -->
                </div>
                <div class="text-center mt-12">
                    <button id="show-more" class="bg-[#E21E26] text-white px-10 py-5 font-black uppercase text-xs hover:bg-black transition-all">Show More</button>
                </div>
            </div>
        </section>
    </div>

    <script src="theme.js"></script>
    <script src="news-data.js"></script>
    <script src="sponsors-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => siteTheme.init(""));
    </script>
</body>
</html>
