<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Seabee Construction | Clackamas United</title>
</head>
<body class="bg-slate-50">

    <div id="page-content">
        <main class="max-w-4xl mx-auto my-20 px-6">
            <article>
                <div class="text-center mb-12">
                    <p class="text-sm font-bold text-cu-red uppercase tracking-widest">April 01, 2026</p>
                    <h1 class="text-5xl font-display font-bold uppercase italic mt-2">New Sponsor <span class="text-cu-red">Seabee Construction</span></h1>
                    <p class="text-gray-600 text-lg mt-4">By Tony Stevenson</p>
                </div>

                <div class="mb-12 flex justify-center">
                    <img src="/sponsors/seabee.png" alt="Seabee Construction" class="max-h-[500px] w-auto rounded-lg shadow-xl">
                </div>

                <div class="prose lg:prose-xl mx-auto text-gray-800">
                    <p class="lead">
                    <p>Clackamas Unirted are excited to announce that our new title sponsor is <a href="https://builtbyseabee.com">Seabee Construction</a>.</p>
                </div>
            </article>
        </main>
    </div>

    <script src="../theme.js"></script>
    <script src="../sponsors-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => siteTheme.init("../"));
    </script>
</body>
</html>
