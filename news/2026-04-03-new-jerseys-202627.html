<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind config MUST be before the Tailwind CDN script -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cu-red': '#E21E26', // Define the custom color here
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Seabee Construction | Clackamas United</title>
</head>
<body class="bg-slate-50">

    <div id="page-content">
        <main class="max-w-4xl mx-auto my-20 px-6">
            <article>
                <div class="text-center mb-12">
                    <p class="text-sm font-bold text-cu-red uppercase tracking-widest">April 03, 2026</p>
                    <h1 class="text-5xl font-display font-bold uppercase italic mt-2">New Jersey designs for <span class="text-[#E21E26]">2026/27</span></h1>
                    <p class="text-gray-600 text-lg mt-4">By Tony Stevenson</p>
                </div>

                <div class="mb-12 flex justify-center">
                    <img src="/news/images/2627-jerseys.png" alt="Clackamas United 2026/27 Jerseys" class="max-h-[500px] w-auto rounded-lg shadow-xl">
                </div>

                <div class="prose lg:prose-xl mx-auto text-gray-800">
                    <h3 class="text-2xl lg:text-3xl font-bold font-display uppercase italic my-6 text-gray-900">In partnership with Seabee Construction</a> we are excited to share the new jersey design for the upcoming year.</h3>
                    <p>Clackamas United Soccer Club is excited to share our new Jersey design featuring our partnership with <a href="https://builtbyseabee.com" class="text-[#E21E26] underline">Seabee Construction</a>.</p>
                    
        
                </div>
            </article>
        </main>
    </div>

    <script src="../theme.js"></script>
    <script src="../sponsors-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => siteTheme.init("../"));
    </script>
</body>
</html>
