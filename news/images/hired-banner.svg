<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;display=swap');
            .title-font { font-family: 'Oswald', sans-serif; font-weight: 700; fill: #4A5568; font-size: 100px; text-anchor: middle; text-transform: uppercase; }
            .banner-font { font-family: 'Oswald', sans-serif; font-weight: 700; fill: white; font-size: 80px; text-anchor: middle; text-transform: uppercase; letter-spacing: 0.05em; }
        </style>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="#E2E8F0"/>

    <!-- "WE'RE HIRING" Text -->
    <text x="600" y="345" class="title-font">We're Hiring</text>

    <!-- "Hired!" Banner -->
    <g transform="rotate(-45 50 630)">
        <rect x="-400" y="0" width="1200" height="150" fill="#E21E26" />
        <text x="200" y="105" class="banner-font">Hired!</text>
    </g>
</svg>